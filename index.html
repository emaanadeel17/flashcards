<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fffde7;
      --surface: #ffffff;
      --text: #1a1a1a;
      --text-muted: #888;
      --border: #e0ddd5;
      --purple-light: #eeedfe;
      --purple-dark: #3c3489;
      --green-light: #e1f5ee;
      --green-dark: #085041;
      --pink-light: #fbeaf0;
      --pink-dark: #72243e;
      --amber-light: #faeeda;
      --amber-dark: #633806;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .app {
      max-width: 640px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 10px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .stats {
      display: flex;
      gap: 6px;
    }

    .stat {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .stat.known { background: var(--green-light); color: var(--green-dark); }
    .stat.unknown { background: var(--pink-light); color: var(--pink-dark); }
    .stat.streak { background: var(--purple-light); color: var(--purple-dark); }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 1.5rem;
    }

    .tab {
      padding: 7px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.15s;
      font-weight: 500;
    }

    .tab:hover { border-color: #bbb; color: var(--text); }
    .tab.active { background: var(--text); color: #fff; border-color: var(--text); }

    /* Sections */
    .section { display: none; }
    .section.active { display: block; }

    /* Deck grid */
    .deck-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }

    .deck-card {
      border-radius: var(--radius);
      padding: 1rem;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
    }

    .deck-card:hover { transform: translateY(-3px); }
    .deck-card.selected { border-color: var(--text); }
    .deck-card .emoji { font-size: 26px; margin-bottom: 8px; }
    .deck-card .name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
    .deck-card .count { font-size: 12px; opacity: 0.65; }

    .deck-c0 { background: var(--purple-light); color: var(--purple-dark); }
    .deck-c1 { background: var(--green-light); color: var(--green-dark); }
    .deck-c2 { background: var(--pink-light); color: var(--pink-dark); }
    .deck-c3 { background: var(--amber-light); color: var(--amber-dark); }

    .add-deck-btn {
      width: 100%;
      padding: 12px;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      background: transparent;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .add-deck-btn:hover { border-color: #999; color: var(--text); }

    /* Deck pills */
    .deck-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin-bottom: 1rem;
    }

    .deck-selector label {
      font-size: 13px;
      color: var(--text-muted);
    }

    .pill {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }

    .pill.active { background: var(--text); color: #fff; border-color: var(--text); }
    .pill:hover:not(.active) { border-color: #999; color: var(--text); }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .progress-fill {
      height: 100%;
      background: #639922;
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    /* Flashcard */
    .card-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .flashcard {
      width: 100%;
      height: 220px;
      perspective: 1000px;
      cursor: pointer;
    }

    .flashcard-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 16px;
    }

    .flashcard.flipped .flashcard-inner {
      transform: rotateY(180deg);
    }

    .flashcard-front,
    .flashcard-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }

    .flashcard-front {
      background: var(--surface);
      border: 1.5px solid var(--border);
    }

    .flashcard-back {
      background: #1a1a1a;
      transform: rotateY(180deg);
    }

    .card-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .flashcard-front .card-label { color: var(--text-muted); }
    .flashcard-back .card-label { color: rgba(255,255,255,0.45); }

    .flashcard-front .card-text {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
    }

    .flashcard-back .card-text {
      font-size: 16px;
      color: rgba(255,255,255,0.92);
      line-height: 1.55;
    }

    .card-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 10px;
    }

    /* Nav */
    .card-nav {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .card-counter {
      font-size: 13px;
      color: var(--text-muted);
      min-width: 56px;
      text-align: center;
    }

    /* Action buttons */
    .action-btns {
      display: flex;
      gap: 10px;
      transition: opacity 0.2s;
    }

    .action-btns.hidden { opacity: 0.3; pointer-events: none; }

    .action-btn {
      padding: 9px 22px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: 'Inter', sans-serif;
      transition: transform 0.1s, opacity 0.15s;
    }

    .action-btn:active { transform: scale(0.96); }
    .action-btn.known { background: var(--green-light); color: var(--green-dark); }
    .action-btn.known:hover { background: #c0dd97; }
    .action-btn.unknown { background: var(--pink-light); color: var(--pink-dark); }
    .action-btn.unknown:hover { background: #f5c4b3; }

    /* Buttons */
    .btn {
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text);
      transition: all 0.15s;
    }

    .btn:hover { background: var(--bg); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.primary { background: var(--text); color: #fff; border-color: var(--text); }
    .btn.primary:hover { opacity: 0.85; }

    /* Done screen */
    .done-screen {
      text-align: center;
      padding: 2.5rem 1rem;
    }

    .done-screen .big { font-size: 48px; margin-bottom: 14px; }
    .done-screen h2 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
    .done-screen p { font-size: 14px; color: var(--text-muted); margin-bottom: 1.5rem; }

    .score-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 1.5rem;
    }

    .score-row .label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 5px;
    }

    .done-btns {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Manage cards */
    .card-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }

    .card-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--surface);
    }

    .card-item-q { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); }
    .card-item-a { flex: 1; font-size: 13px; color: var(--text-muted); }

    .card-item-del {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 16px;
      padding: 4px 6px;
      border-radius: 6px;
      transition: all 0.15s;
    }

    .card-item-del:hover { background: var(--pink-light); color: var(--pink-dark); }

    .empty-msg { font-size: 14px; color: var(--text-muted); padding: 1rem 0; }

    /* Modal */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-bg.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 16px;
      padding: 1.5rem;
      width: 100%;
      max-width: 400px;
      border: 1.5px solid var(--border);
    }

    .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }

    .modal input,
    .modal textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: var(--bg);
      margin-bottom: 10px;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }

    .modal input:focus,
    .modal textarea:focus { border-color: #999; }
    .modal textarea { min-height: 72px; }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 4px;
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>Flashcards</h1>
    <div class="stats">
      <span class="stat known">&#x2713; <span id="total-known">0</span> known</span>
      <span class="stat unknown">&#x2715; <span id="total-unknown">0</span> unknown</span>
      <span class="stat streak">&#x1F525; <span id="streak-count">0</span> streak</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('study')">Study</button>
    <button class="tab" onclick="switchTab('decks')">Decks</button>
    <button class="tab" onclick="switchTab('manage')">Manage cards</button>
  </div>

  <!-- STUDY TAB -->
  <div id="tab-study" class="section active">
    <div id="study-no-deck" class="empty-msg" style="display:none">Create a deck first in the Decks tab!</div>
    <div id="study-empty" class="empty-msg" style="display:none">This deck has no cards yet. Add some in Manage cards!</div>
    <div id="study-content">
      <div class="deck-selector">
        <label>Deck:</label>
        <div id="deck-pills-study"></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="card-area" id="card-area"></div>
    </div>
    <div id="done-screen" class="done-screen" style="display:none">
      <div class="big" id="done-emoji">&#x1F389;</div>
      <h2 id="done-title">Deck complete!</h2>
      <p id="done-msg"></p>
      <div class="score-row">
        <div><div class="label">Known</div><span class="stat known" id="done-known">0</span></div>
        <div><div class="label">Still learning</div><span class="stat unknown" id="done-unknown">0</span></div>
      </div>
      <div class="done-btns">
        <button class="btn primary" onclick="restartDeck()">Restart deck</button>
        <button class="btn" onclick="studyMissed()">Study missed only</button>
      </div>
    </div>
  </div>

  <!-- DECKS TAB -->
  <div id="tab-decks" class="section">
    <div class="deck-grid" id="deck-grid"></div>
    <button class="add-deck-btn" onclick="openModal('modal-new-deck')">+ New deck</button>
  </div>

  <!-- MANAGE TAB -->
  <div id="tab-manage" class="section">
    <div class="deck-selector">
      <label>Deck:</label>
      <div id="deck-pills-manage"></div>
    </div>
    <div class="card-list" id="card-list"></div>
    <button class="btn primary" id="add-card-btn" onclick="openModal('modal-add-card')">+ Add card</button>
  </div>
</div>

<!-- MODALS -->
<div class="modal-bg" id="modal-new-deck">
  <div class="modal">
    <h2>New deck</h2>
    <input type="text" id="new-deck-name" placeholder="Deck name (e.g. SAT Vocab)" maxlength="40">
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-new-deck')">Cancel</button>
      <button class="btn primary" onclick="createDeck()">Create</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-add-card">
  <div class="modal">
    <h2>Add flashcard</h2>
    <textarea id="card-q" placeholder="Question or term..."></textarea>
    <textarea id="card-a" placeholder="Answer or definition..."></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-add-card')">Cancel</button>
      <button class="btn primary" onclick="addCard()">Add card</button>
    </div>
  </div>
</div>

<script>
  const EMOJIS = ['📚','🧠','⚡','🎯','🔥','💡','📝','🌟'];
  const COLORS = [0,1,2,3];

  let state = {
    decks: [
      { id:'d1', name:'SAT Vocab', emoji:'📝', color:0, cards:[
        {id:'c1',q:'Ameliorate',a:'To make something bad or unsatisfactory better'},
        {id:'c2',q:'Laconic',a:'Using very few words; brief and concise'},
        {id:'c3',q:'Ephemeral',a:'Lasting for a very short time'},
        {id:'c4',q:'Equivocal',a:'Open to more than one interpretation; ambiguous'},
      ]},
      { id:'d2', name:'Punctuation Rules', emoji:'✏️', color:1, cards:[
        {id:'c5',q:'When to use a semicolon?',a:'To join two independent clauses, or separate items in a complex list that already has commas'},
        {id:'c6',q:'The dash rule',a:'A sentence must always have 0 or 2 dashes — never 1 or 3'},
        {id:'c7',q:'3 criteria for a colon',a:'1. Pre-colon clause is independent 2. After colon starts with noun/pronoun 3. Post-colon explains pre-colon'},
      ]},
    ],
    known: {},
    unknown: {},
    streak: 0,
    currentDeckId: 'd1',
    manageDeckId: 'd1',
    cardIndex: 0,
    flipped: false,
    studyQueue: [],
  };

  function save() { try { localStorage.setItem('flashcard_app', JSON.stringify(state)); } catch(e){} }
  function load() { try { const d = localStorage.getItem('flashcard_app'); if(d) state = JSON.parse(d); } catch(e){} }
  function getDeck(id) { return state.decks.find(d => d.id === id); }

  function switchTab(t) {
    document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', ['study','decks','manage'][i] === t));
    document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-'+t).classList.add('active');
    if(t==='study') renderStudy();
    if(t==='decks') renderDecks();
    if(t==='manage') renderManage();
  }

  function renderPills(containerId, activeId, fn) {
    document.getElementById(containerId).innerHTML = state.decks.map(d =>
      `<button class="pill ${d.id===activeId?'active':''}" onclick="${fn}('${d.id}')">${d.emoji} ${d.name}</button>`
    ).join('');
  }

  function setStudyDeck(id) {
    state.currentDeckId = id;
    state.cardIndex = 0;
    state.flipped = false;
    state.studyQueue = [...(getDeck(id)?.cards || [])];
    save(); renderStudy();
  }

  function setManageDeck(id) {
    state.manageDeckId = id;
    save(); renderManage();
  }

  function renderStudy() {
    if(!state.decks.length) {
      document.getElementById('study-content').style.display = 'none';
      document.getElementById('study-no-deck').style.display = 'block';
      document.getElementById('done-screen').style.display = 'none';
      return;
    }
    if(!state.currentDeckId || !getDeck(state.currentDeckId)) {
      state.currentDeckId = state.decks[0].id;
    }
    if(!state.studyQueue.length) {
      state.studyQueue = [...(getDeck(state.currentDeckId)?.cards || [])];
      state.cardIndex = 0;
    }

    renderPills('deck-pills-study', state.currentDeckId, 'setStudyDeck');
    updateStats();

    const deck = getDeck(state.currentDeckId);
    if(!deck?.cards.length) {
      document.getElementById('study-content').style.display = 'none';
      document.getElementById('study-empty').style.display = 'block';
      document.getElementById('done-screen').style.display = 'none';
      return;
    }

    document.getElementById('study-empty').style.display = 'none';

    if(state.cardIndex >= state.studyQueue.length) { showDone(); return; }

    document.getElementById('study-content').style.display = 'block';
    document.getElementById('done-screen').style.display = 'none';

    const pct = Math.round((state.cardIndex / state.studyQueue.length) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';

    const card = state.studyQueue[state.cardIndex];
    document.getElementById('card-area').innerHTML = `
      <div class="flashcard ${state.flipped?'flipped':''}" id="the-card" onclick="flipCard()">
        <div class="flashcard-inner">
          <div class="flashcard-front">
            <div class="card-label">Question</div>
            <div class="card-text">${card.q}</div>
            <div class="card-hint">Click to reveal answer</div>
          </div>
          <div class="flashcard-back">
            <div class="card-label">Answer</div>
            <div class="card-text">${card.a}</div>
          </div>
        </div>
      </div>
      <div class="card-nav">
        <button class="btn" onclick="event.stopPropagation();prevCard()" ${state.cardIndex===0?'disabled':''}>&#8592;</button>
        <span class="card-counter">${state.cardIndex+1} / ${state.studyQueue.length}</span>
        <button class="btn" onclick="event.stopPropagation();nextCard()">&#8594;</button>
      </div>
      <div class="action-btns ${!state.flipped?'hidden':''}">
        <button class="action-btn unknown" onclick="markCard(false)">😅 Still learning</button>
        <button class="action-btn known" onclick="markCard(true)">🌟 Got it!</button>
      </div>
    `;
  }

  function flipCard() { state.flipped = !state.flipped; renderStudy(); }
  function prevCard() { if(state.cardIndex>0){state.cardIndex--;state.flipped=false;renderStudy();} }
  function nextCard() { state.cardIndex++;state.flipped=false;renderStudy(); }

  function markCard(known) {
    const card = state.studyQueue[state.cardIndex];
    if(known){ state.known[card.id]=true; delete state.unknown[card.id]; state.streak++; }
    else { state.unknown[card.id]=true; delete state.known[card.id]; state.streak=0; }
    state.cardIndex++; state.flipped=false;
    save(); updateStats(); renderStudy();
  }

  function updateStats() {
    document.getElementById('total-known').textContent = Object.keys(state.known).length;
    document.getElementById('total-unknown').textContent = Object.keys(state.unknown).length;
    document.getElementById('streak-count').textContent = state.streak;
  }

  function showDone() {
    document.getElementById('study-content').style.display = 'none';
    document.getElementById('done-screen').style.display = 'block';
    const q = state.studyQueue;
    const k = q.filter(c=>state.known[c.id]).length;
    const u = q.filter(c=>state.unknown[c.id]).length;
    const pct = Math.round((k/q.length)*100);
    document.getElementById('done-emoji').textContent = pct>=80?'🎉':pct>=50?'💪':'📚';
    document.getElementById('done-title').textContent = pct>=80?'Amazing job!':pct>=50?'Good effort!':'Keep practicing!';
    document.getElementById('done-msg').textContent = `You got ${k} out of ${q.length} cards right (${pct}%)`;
    document.getElementById('done-known').textContent = k+' known';
    document.getElementById('done-unknown').textContent = u+' to review';
  }

  function restartDeck() {
    state.studyQueue = [...(getDeck(state.currentDeckId)?.cards||[])];
    state.cardIndex=0; state.flipped=false;
    document.getElementById('done-screen').style.display='none';
    renderStudy();
  }

  function studyMissed() {
    const missed = state.studyQueue.filter(c=>state.unknown[c.id]);
    if(!missed.length){ restartDeck(); return; }
    state.studyQueue=missed; state.cardIndex=0; state.flipped=false;
    document.getElementById('done-screen').style.display='none';
    renderStudy();
  }

  function renderDecks() {
    document.getElementById('deck-grid').innerHTML = state.decks.map(d=>`
      <div class="deck-card deck-c${d.color%4}" onclick="setStudyDeck('${d.id}')">
        <div class="emoji">${d.emoji}</div>
        <div class="name">${d.name}</div>
        <div class="count">${d.cards.length} card${d.cards.length!==1?'s':''}</div>
      </div>
    `).join('');
  }

  function renderManage() {
    if(!state.decks.length){
      document.getElementById('card-list').innerHTML='<p class="empty-msg">Create a deck first in the Decks tab.</p>';
      document.getElementById('add-card-btn').style.display='none';
      return;
    }
    if(!state.manageDeckId||!getDeck(state.manageDeckId)) state.manageDeckId=state.decks[0].id;
    document.getElementById('add-card-btn').style.display='';
    renderPills('deck-pills-manage', state.manageDeckId, 'setManageDeck');
    const deck = getDeck(state.manageDeckId);
    if(!deck.cards.length){
      document.getElementById('card-list').innerHTML='<p class="empty-msg">No cards yet. Add one below!</p>';
      return;
    }
    document.getElementById('card-list').innerHTML = deck.cards.map(c=>`
      <div class="card-item">
        <div class="card-item-q">${c.q}</div>
        <div class="card-item-a">${c.a}</div>
        <button class="card-item-del" onclick="deleteCard('${deck.id}','${c.id}')" title="Delete">&#x1F5D1;</button>
      </div>
    `).join('');
  }

  function deleteCard(deckId, cardId) {
    const deck = getDeck(deckId);
    deck.cards = deck.cards.filter(c=>c.id!==cardId);
    save(); renderManage();
  }

  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  function createDeck() {
    const name = document.getElementById('new-deck-name').value.trim();
    if(!name) return;
    state.decks.push({ id:'d'+Date.now(), name, emoji:EMOJIS[Math.floor(Math.random()*EMOJIS.length)], color:state.decks.length%4, cards:[] });
    document.getElementById('new-deck-name').value='';
    closeModal('modal-new-deck');
    save(); renderDecks();
  }

  function addCard() {
    const q = document.getElementById('card-q').value.trim();
    const a = document.getElementById('card-a').value.trim();
    if(!q||!a) return;
    getDeck(state.manageDeckId).cards.push({id:'c'+Date.now(),q,a});
    document.getElementById('card-q').value='';
    document.getElementById('card-a').value='';
    closeModal('modal-add-card');
    save(); renderManage();
  }

  document.querySelectorAll('.modal-bg').forEach(m => m.addEventListener('click', e => { if(e.target===m) m.classList.remove('open'); }));

  load();
  if(!state.studyQueue.length && getDeck(state.currentDeckId)) state.studyQueue = [...getDeck(state.currentDeckId).cards];
  renderStudy();
  renderDecks();
  renderManage();
  updateStats();
</script>
</body>
</html>
